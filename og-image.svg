<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8200"/>
      <stop offset="100%" style="stop-color:#FFaa00"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Logo text -->
  <text x="80" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#FF8200">PERFFECO</text>
  <!-- Main heading -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#FFFFFF">The Bloomberg Terminal</text>
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#FF8200">for AI Costs</text>
  <!-- Subheading -->
  <text x="80" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8899aa">Real-time LLM pricing, GPU cloud economics, and AI FinOps intelligence.</text>
  <!-- Stats boxes -->
  <rect x="80" y="470" width="200" height="80" rx="8" fill="#1a2030" stroke="#1e2a38" stroke-width="1"/>
  <text x="180" y="505" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#FF8200" text-anchor="middle">22</text>
  <text x="180" y="535" font-family="system-ui, sans-serif" font-size="14" fill="#667788" text-anchor="middle">AI Models</text>
  <rect x="310" y="470" width="200" height="80" rx="8" fill="#1a2030" stroke="#1e2a38" stroke-width="1"/>
  <text x="410" y="505" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#33CC66" text-anchor="middle">12</text>
  <text x="410" y="535" font-family="system-ui, sans-serif" font-size="14" fill="#667788" text-anchor="middle">Cloud Providers</text>
  <rect x="540" y="470" width="200" height="80" rx="8" fill="#1a2030" stroke="#1e2a38" stroke-width="1"/>
  <text x="640" y="505" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#3399FF" text-anchor="middle">15</text>
  <text x="640" y="535" font-family="system-ui, sans-serif" font-size="14" fill="#667788" text-anchor="middle">Benchmarks</text>
  <!-- URL -->
  <text x="1120" y="590" font-family="system-ui, sans-serif" font-size="18" fill="#556677" text-anchor="end">perffeco.com</text>
</svg>
